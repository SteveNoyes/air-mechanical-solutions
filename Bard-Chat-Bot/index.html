<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bard HVAC FAQ Chatbot Demo</title>
  <link rel="stylesheet" href="style-guide/style-guide.css">
  <link rel="stylesheet" href="chatbot.css">
</head>
<body>
  <h1>Bard HVAC FAQ Chatbot</h1>
  <p>Type a question below and press Enter or click "Send".</p>

  <!-- Chatbot Toggle Button -->
  <button id="chatbot-toggle" class="chatbot-toggle" aria-label="Open chat">
    <img src="mobile-logo-transparent-bg.png" alt="Chat icon" class="chatbot-toggle__icon" />
    <p>Chat</p>
  </button>
  <!-- Chatbot Container -->
  <div id="faq-chatbot" class="chatbot-closed"></div>

  <script src="chatbot.js"></script>
</body>
</html>
